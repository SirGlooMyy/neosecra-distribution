# NeoSecra Assessment — internal pilot compose.
# Production stack for the NeoSecra Security Health assessment platform.
name: neosecra-assessment

services:
  postgres:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE must be set}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neosecra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-neosecra_assessment}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-25433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neosecra} -d ${POSTGRES_DB:-neosecra_assessment}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:?REDIS_IMAGE must be set}
    ports:
      - "${REDIS_PORT:-23639}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set}
    env_file:
      - .env.v1
    environment:
      NEOSECRA_EDITION: ${NEOSECRA_EDITION:-security_health}
      NEOSECRA_VERSION: ${NEOSECRA_VERSION:-1.0.0}
      PRODUCT_VERSION: ${NEOSECRA_VERSION:-1.0.0}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      MPLCONFIGDIR: /tmp/.cache/matplotlib
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
      - backups:/app/backups
    ports:
      - "${BACKEND_PORT:-23800}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:?WORKER_IMAGE must be set}
    env_file:
      - .env.v1
    environment:
      NEOSECRA_EDITION: ${NEOSECRA_EDITION:-security_health}
      NEOSECRA_VERSION: ${NEOSECRA_VERSION:-1.0.0}
      PRODUCT_VERSION: ${NEOSECRA_VERSION:-1.0.0}
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      MPLCONFIGDIR: /tmp/.cache/matplotlib
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
      - backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be set}
    environment:
      VITE_NEOSECRA_EDITION: ${VITE_NEOSECRA_EDITION:-security-health}
    ports:
      - "${FRONTEND_PORT:-23300}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  openvas:
    image: ${OPENVAS_IMAGE:?OPENVAS_IMAGE must be set}
    profiles: ["openvas"]
    privileged: true
    environment:
      OV_PASSWORD: ${OV_PASSWORD:-}
      OV_USER: ${OV_USER:-admin}
    ports:
      - "${OPENVAS_SSH_PORT:-25922}:22"
      - "${OPENVAS_GSAD_PORT:-25992}:9392"
    volumes:
      - openvas-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 4g

volumes:
  pgdata:
  uploads:
  reports:
  backups:
  openvas-data:
